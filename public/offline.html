<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Friends Media Offline</title>
    <meta name="theme-color" content="#214D42" />
    <style>
      :root {
        color-scheme: light;
        --bg: #f6eddd;
        --panel: rgba(255, 250, 242, 0.92);
        --text: #221b15;
        --muted: #6f6559;
        --accent: #214d42;
        --gold: #d8aa57;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(216,170,87,0.24), transparent 30%),
          radial-gradient(circle at bottom right, rgba(33,77,66,0.14), transparent 22%),
          linear-gradient(180deg, #fbf3e7 0%, var(--bg) 100%);
      }

      .card {
        width: min(100%, 560px);
        border-radius: 28px;
        padding: 32px;
        background: var(--panel);
        border: 1px solid rgba(80, 61, 39, 0.12);
        box-shadow: 0 28px 60px rgba(37, 27, 18, 0.12);
      }

      .badge {
        display: inline-flex;
        padding: 8px 14px;
        border-radius: 999px;
        background: rgba(33, 77, 66, 0.08);
        color: var(--accent);
        text-transform: uppercase;
        letter-spacing: 0.24em;
        font-size: 11px;
      }

      h1 {
        margin: 18px 0 12px;
        font-size: clamp(2rem, 5vw, 3rem);
        line-height: 1.05;
      }

      p {
        margin: 0;
        line-height: 1.7;
        color: var(--muted);
      }

      .actions {
        margin-top: 24px;
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }

      a, button {
        border: 0;
        border-radius: 999px;
        padding: 12px 18px;
        font: inherit;
        cursor: pointer;
        text-decoration: none;
      }

      .primary {
        background: var(--accent);
        color: white;
      }

      .secondary {
        background: white;
        color: var(--text);
        border: 1px solid rgba(80, 61, 39, 0.12);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <span class="badge">Offline</span>
      <h1>You&apos;re offline right now.</h1>
      <p>Friends Media can open again as soon as your internet connection returns. Saved app files are still installed, but fresh uploads, login, and Drive media need a live connection.</p>
      <div class="actions">
        <button class="primary" onclick="window.location.reload()">Try again</button>
        <a class="secondary" href="/">Go home</a>
      </div>
    </main>
  </body>
</html>
